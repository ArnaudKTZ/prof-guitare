<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="112" fill="#1a1a1f"/>
  <rect width="512" height="512" rx="112" fill="url(#g)" opacity="0.15"/>
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="512" y2="512">
      <stop offset="0" stop-color="#e0a458"/>
      <stop offset="1" stop-color="#d4623a"/>
    </linearGradient>
  </defs>
  <!-- corps de guitare stylisé -->
  <circle cx="256" cy="336" r="120" fill="none" stroke="#e0a458" stroke-width="18"/>
  <circle cx="256" cy="336" r="46" fill="#14141a" stroke="#d4623a" stroke-width="10"/>
  <!-- manche -->
  <rect x="240" y="70" width="32" height="200" rx="8" fill="#e0a458"/>
  <!-- cordes -->
  <g stroke="#d4623a" stroke-width="4" opacity="0.8">
    <line x1="248" y1="80" x2="248" y2="456"/>
    <line x1="264" y1="80" x2="264" y2="456"/>
  </g>
  <!-- frettes -->
  <g stroke="#14141a" stroke-width="5">
    <line x1="240" y1="120" x2="272" y2="120"/>
    <line x1="240" y1="165" x2="272" y2="165"/>
    <line x1="240" y1="210" x2="272" y2="210"/>
  </g>
</svg>
